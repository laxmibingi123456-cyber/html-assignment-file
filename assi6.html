<!DOCTYPE html>
<head>
    <title>table using rowspan and colspan</title>
</head>
<body>
    <table border="1" width="70%" cellspacing="5" cellpadding="10" align="center">
        <tr>
            <th colspan="4">table using rowspan and colspan</th>
        </tr>
        <tr>
            <th colspan="4">khanewel self store</th>
        </tr>

        <tr>
            <td>sugar</td>
            <td>50kg</td>
            <td>50</td>
            <td>250</td>
        </tr>

        <tr>
            <td>cooking oil</td>
            <td>2kg</td>
            <td>200</td>
            <td>400</td>
        </tr>

        <tr>
            <td>soap</td>
            <td>4 piesc</td>
            <td>40</td>
            <td>160</td>
        </tr>

        <tr>
            <td colspan="3">sub total</td>
            <td>810</td>
        </tr>

        <tr>
            <td colspan="2">tax</td>
            <td>5%</td>
            <td>41</td>
        </tr>

        <tr>
            <td colspan="3">total bill</td>
            <td>851</td>
        </tr>

    </table> 
</body>
</html>
