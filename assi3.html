<!DOCTYPE html>
<head>
    <title>
        invoice
    </title>
</head>
<body>
    
    <table border="1" cellspacing="0" cellpadding="10" width="70" align="center">
        <h2 align="center">invoice</h2>
        <tr>
            <th>item/desc</th>
            <th>quantity</th>
            <th>@</th>
            <th>price</th>
        </tr>

        <tr>
            <td>paperclips(box)</td>
            <td>100</td>
            <td>1.15</td>
            <td>115.00</td>
        </tr>

        <tr>
            <td>paper(case)</td>
            <td>10</td>
            <td>45.99</td>
            <td>459.90</td>
        </tr>

        <tr>
            <td>wastepaper</td>
            <td>2</td>
            <td>17.99</td>
            <td>35.98</td>
        </tr>

        <tr>
            <td colspan="3">subtotal</td>
            <td>610.88</td>
        </tr>

        <tr>
            <td colspan="2">tax</td>
            <td>7%</td>
            <td>42.76</td>
        </tr>

        <tr>
            <td colspan="3">total</td>
            <td>653.64</td>
        </tr>
    </table>
</body>
</html>
