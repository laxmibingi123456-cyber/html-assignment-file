<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>

<table border="1" cellspacing="5" cellpadding="20" align="center">

    <tr>
        <th>Header</th>
        <th>Header</th>
        <th>Header</th>
        <th>Header</th>
    </tr>

    <tr>
        <td rowspan="3" align="center">
            span<br>rows
        </td>

        <td colspan="3" align="center">
            span columns
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            span columns
        </td>

        <td rowspan="2" align="center">
            span<br>both
        </td>
    </tr>

    <tr>
        <td align="center">
            span<br>rows
        </td>

        <td align="center">
            span columns
            <br><br>
            span<br>both
        </td>
    </tr>

</table>

</body>
</html>
