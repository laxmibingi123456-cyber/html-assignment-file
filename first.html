<!DOCTYPE html>
<head>
    <title>css</title>
    <style>
        p{
            color:#ea4863;
        }

        .firstp{
            color:aqua;
            font-weight: 200;
            font-size: 30px;
        }

        #secoundp{
            color:blue;
            font-weight: 200;
            font-family:'Times New Roman', Times, serif;
            font-size:20px;
        }
    </style>
</head>
<body>
    <p style="color:pink;font-weight: bold;font-size: 90px;">This is heading</p>
    <p class="firstp">this is inline css using class nameing</p>
    <p id="secoundp">this is inline css using class nameing</p>
</body>
</html>
