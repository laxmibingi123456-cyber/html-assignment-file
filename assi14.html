<!DOCTYPE html>
<head>
    <title>table with column and rows</title>
</head>
<body>
    <table  border="1" cellspacing="0" cellpadding="10" width="40%" height="50" align="center">
        <tr>
            <td bgcolor="pink">logo</td>
            <td colspan="4" align="center" bgcolor="yellow"> top menu</td>
        </tr>

        <tr>
            <td rowspan="2" bgcolor="yellow">side menu</td>
            <td bgcolor="blue">world news</td>
            <td bgcolor="blue">finanicail</td>
            <td rowspan="2" bgcolor="pink">list of ads</td>
        </tr>

        <tr>
            <td bgcolor="blue">tech</td>
            <td bgcolor="blue">sports</td> 
        </tr>

        <tr>
            <td align="center" colspan="4" bgcolor="grey">footer</td>
            
        </tr>
    </table>
</body>
