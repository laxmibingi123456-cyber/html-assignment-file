<!DOCTYPE html>
<head>
    <title>
    table 
    </title>
</head>
<body>
    <table border="1" width="60%" align="center"  cellspacing="3" cellpadding="10">
        <tr>
            <th rowspan="2">state of health</th>
            <th colspan="2">fasting value</th>
            <th>after earing</th>
        </tr>

        <tr>
            <td>minimum</td>
            <td>maximum</td>
            <td>2 hours after eating</td>
        </tr>

        <tr>
            <td>healty</td>
            <td>70</td>
            <td>100</td>
            <td>less than 140</td>
        </tr>

        <tr>
            <td>pre-daibetes</td>
            <td>101</td>
            <td>126</td>
            <td>140 to 200</td>
        </tr>

        <tr>
            <td>Daibetes</td>
            <td>more than 126</td>
            <td>N/A</td>
            <td>more than 200</td>
        </tr>

    </table>
</body>
</html>
