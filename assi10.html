<!DOCTYPE html>
<head>
    <title>rows and colums </title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="7" width="30%" align="center">
        <tr>
            <th> column1 </th>
            <th> column2 </th>
            <th> column3 </th>
        </tr>

        <tr>
            <th rowspan="2">row1 cell1</th>
            <th>row1 cell2</th>
            <th>row1 cell3</th>
        </tr>

        <tr>
            <th>row2 cell2</th>
            <th>row2 cell3</th>
        </tr>

        <tr>
            <th colspan="3" align="left">row3 cell1</th>
        </tr>
    </table>
</body>
